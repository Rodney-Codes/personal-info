name: Chatbot Improvement Loop

on:
  schedule:
    # Weekly on Mondays at 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Lookback window (days) for chat log analysis"
        required: false
        default: "30"
      gate_hit_at_k:
        description: "Minimum hit_at_k required (0 to disable)"
        required: false
        default: "0.6"
      gate_mrr:
        description: "Minimum MRR required (0 to disable)"
        required: false
        default: "0.5"

permissions:
  contents: read

concurrency:
  group: chatbot-improvement-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  evaluate-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install minimal Python deps
        run: |
          python -m pip install --upgrade pip
          # The eval/analyze scripts only require the docs_chatbot_service package
          # itself plus its core deps. Install via pyproject for portability.
          pip install -e .

      - name: Show inputs
        run: |
          echo "lookback_days=${{ github.event.inputs.lookback_days || '30' }}"
          echo "gate_hit_at_k=${{ github.event.inputs.gate_hit_at_k || '0.6' }}"
          echo "gate_mrr=${{ github.event.inputs.gate_mrr || '0.5' }}"

      - name: Run offline retrieval evaluation (report-only)
        id: eval
        env:
          GATE_HIT: ${{ github.event.inputs.gate_hit_at_k || '0.6' }}
          GATE_MRR: ${{ github.event.inputs.gate_mrr || '0.5' }}
        run: |
          mkdir -p data/chat_reports
          set +e
          python -m scripts.eval_retrieval \
            --eval data/eval/retrieval_eval.json \
            --index-root data/index \
            --retrieval-models bm25 hashed_vector bm25_hashed_vector rule_lexicon_tfidf \
            --top-k 3 \
            --gate-hit-at-k "${GATE_HIT}" \
            --gate-mrr "${GATE_MRR}" \
            --report-out data/chat_reports/eval_report.json
          eval_exit=$?
          echo "eval_exit=${eval_exit}" >> "$GITHUB_OUTPUT"
          # Report-only: do not fail the workflow even if the gate fails. The
          # report artifact and exit code are surfaced for review.
          exit 0

      - name: Analyze chat logs (Supabase)
        id: analyze
        env:
          LOOKBACK: ${{ github.event.inputs.lookback_days || '30' }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -n "${SUPABASE_DB_URL}" ]; then
            python -m scripts.analyze_chat_logs \
              --db-url "${SUPABASE_DB_URL}" \
              --since "${LOOKBACK}" \
              --output data/chat_reports/chat_log_report.json \
              --verbose
            echo "analysis_status=ran" >> "$GITHUB_OUTPUT"
          else
            echo "No SUPABASE_DB_URL secret found - skipping analyze step." >&2
            echo "analysis_status=skipped" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload chatbot improvement reports
        uses: actions/upload-artifact@v6
        with:
          name: chatbot-improvement-reports
          path: data/chat_reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Summarize results
        run: |
          echo "## Chatbot improvement loop summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Eval exit code: ${{ steps.eval.outputs.eval_exit }} (0 = pass, 3 = gate failed)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Analyze step: ${{ steps.analyze.outputs.analysis_status }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -f data/chat_reports/eval_report.json ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Retrieval metrics" >> "$GITHUB_STEP_SUMMARY"
            python -c "import json; d=json.load(open('data/chat_reports/eval_report.json'));\
              print('| model | total | hit@k | mrr | gate |');\
              print('| --- | --- | --- | --- | --- |');\
              [print(f\"| {m} | {s['total']} | {s['hit_at_k']:.2f} | {s['mrr']:.2f} | {'PASS' if s['passes_gate'] else 'FAIL'} |\") for m, s in d['models'].items()]" \
              >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f data/chat_reports/chat_log_report.json ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Chat log recommendations" >> "$GITHUB_STEP_SUMMARY"
            python -c "import json; d=json.load(open('data/chat_reports/chat_log_report.json'));\
              [print(f\"- {s}\") for s in d['recommendations']['suggestions']]" \
              >> "$GITHUB_STEP_SUMMARY"
          fi
