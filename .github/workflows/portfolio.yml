# CI on every PR/push; deploy static site to GitHub Pages on push to the default branch.
name: Portfolio

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Opt into Node.js 24 for JS-based actions (see GitHub deprecation of Node 20 runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: portfolio-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # xhtml2pdf/reportlab/svg stack can pull pycairo; building pycairo needs libcairo headers on the runner.
      - name: Install OS packages for PDF (cairo)
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config

      - name: Build resume PDF (workflow-selected)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m tools resume build

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: portfolio/package-lock.json

      - name: Install, sync, test, validate, build
        working-directory: portfolio
        env:
          GITHUB_PAGES: "true"
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Unique per commit so workflow.runtime.json / site JSON bypass Fastly max-age=600 edge cache
          VITE_SITE_DATA_BUST: ${{ github.sha }}
        run: |
          npm ci
          npm run sync
          npm run test
          npm run validate:site
          npm run build

      - name: List build output (debug)
        run: ls -la portfolio/dist && test -f portfolio/dist/index.html

      - name: Verify site data in dist (debug)
        run: |
          node -e "const fs=require('fs'); const path=require('path'); const runtimePath=path.resolve('./portfolio/dist/workflow.runtime.json'); const runtime=JSON.parse(fs.readFileSync(runtimePath,'utf8')); const sitePath=path.resolve('./portfolio/dist', runtime.site_json_file); const j=JSON.parse(fs.readFileSync(sitePath,'utf8')); console.log('site file:', runtime.site_json_file); console.log('pdfAvailable:', j.pdfAvailable); console.log('profilePhotoUrl set:', !!(j.ui&&j.ui.profilePhotoUrl)); console.log('ui.footerNote length:', (j.ui&&j.ui.footerNote||'').length); console.log('ui.workHighlightsLede length:', (j.ui&&j.ui.workHighlightsLede||'').length);"

      # Avoid upload-pages-artifact@v4: it pins upload-artifact@v4 (Node 20) and excludes root dotfiles (e.g. .nojekyll).
      # Same tar layout as upload-pages-artifact v3 + upload-artifact@v6 (Node 24).
      - name: Archive GitHub Pages artifact
        if: |
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
        shell: bash
        run: |
          set -euo pipefail
          tar --dereference --hard-dereference \
            --directory "portfolio/dist" \
            -cvf "${RUNNER_TEMP}/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .

      - name: Upload GitHub Pages artifact
        if: |
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
        uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
