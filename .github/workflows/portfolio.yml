# CI on every PR/push; deploy static site to GitHub Pages on push to the default branch.
name: Portfolio

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Opt into Node.js 24 for JS-based actions (see GitHub deprecation of Node 20 runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: portfolio-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: portfolio/package-lock.json

      - name: Install, sync, test, validate, build
        working-directory: portfolio
        env:
          GITHUB_PAGES: "true"
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          npm ci
          npm run sync
          npm run test
          npm run validate:site
          npm run build

      - name: List build output (debug)
        run: ls -la portfolio/dist && test -f portfolio/dist/index.html

      - name: Verify site data in dist (debug)
        run: |
          node -e "const j=require('./portfolio/dist/site.json'); console.log('ui.footerNote length:', (j.ui&&j.ui.footerNote||'').length); console.log('ui.workHighlightsLede length:', (j.ui&&j.ui.workHighlightsLede||'').length);"

      - name: Upload GitHub Pages artifact
        if: |
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
        uses: actions/upload-pages-artifact@v4
        with:
          path: portfolio/dist

  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
